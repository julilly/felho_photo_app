<!DOCTYPE html>
<html>
<head>
    <title>Photos App</title>
    <style>
        body {
            background-color: #fcf9f2;
            color: #5a5a5a; 
            font-family: sans-serif;
            max-width: 600px; 
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.5;
        }
        a {
            color: #8da1d4;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        hr {
            border: 0;
            border-top: 2px dashed #e8d8c8;
            margin: 20px 0;
        }
        button {
            background-color: #b5d5c5;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            color: #444;
            cursor: pointer;
        }
        button:hover {
            background-color: #9ebfac;
        }
        img {
            border-radius: 8px;
        }
    </style>
</head>
<body>

{% if user.is_authenticated %}
    Hello {{ user.username }} |
    <a href="{% url 'logout' %}">Logout</a> |
    <a href="{% url 'upload_photo' %}">Upload</a>
{% else %}
    <a href="{% url 'login' %}">Login</a> |
    <a href="{% url 'register' %}">Register</a>
{% endif %}

<hr>

{% block content %}{% endblock %}

</body>
</html>
